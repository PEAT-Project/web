name: CI / Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Install, Lint, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter (non-blocking)
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Package build as artifact (fallback)
        if: ${{ secrets.VERCEL_TOKEN == '' || secrets.VERCEL_TOKEN == null }}
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Deploy to Vercel (if token provided)
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_TOKEN != null }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel
          vercel --prod --confirm --token ${{ secrets.VERCEL_TOKEN }}
